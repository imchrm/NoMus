environment: production

logging:
  level: WARNING
  format: "%(asctime)s - %(levelname)s - %(message)s"

database:
  type: memory  # Bot uses in-memory cache; actual DB is in NMservices

# Bot delegates SMS/payment to NMservices backend via remote API
services:
  sms:
    type: remote
  payment:
    type: remote

remote_api:
  enabled: true
  base_url: "${REMOTE_API_BASE_URL}"
  api_key: "${REMOTE_API_KEY}"
  timeout: 30.0
  max_retries: 3
  retry_delay: 1.0

bot:
  polling_timeout: 60

api:
  host: "0.0.0.0"
  port: 8000
  reload: false
  workers: 4

monitoring:
  sentry_dsn: "${SENTRY_DSN}"
  enable_metrics: true
